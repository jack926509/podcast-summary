function Pill({ children, cls='', dot=false }) {
  return (
    <span className={`inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-[10.5px] font-semibold ${cls}`}>
      {dot && <span className="dot-pulse h-1.5 w-1.5 rounded-full bg-current"/>}
      {children}
    </span>
  );
}

function Tag({ children, variant='default' }) {
  const v = {
    default: 'bg-white border border-border text-[hsl(25_12%_38%)]',
    cat:     'bg-primary-soft text-primary border-transparent',
  }[variant];
  return <span className={`inline-flex items-center rounded-full border px-2 py-0.5 text-[10.5px] font-medium ${v}`}>{children}</span>;
}

function StatusPill({ status }) {
  const s = STATUS_PILL[status] || STATUS_PILL.done;
  return <Pill cls={s.cls} dot={s.dot}>{s.label}</Pill>;
}

/* renders [TICKER] as monospace mark and **bold** */
function RichText({ text }) {
  const parts = [];
  let i = 0, key = 0;
  const re = /\[([A-Z.\d]+)\]|\*\*([^*]+)\*\*/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > i) parts.push(text.slice(i, m.index));
    if (m[1]) parts.push(<mark key={key++} className="rounded bg-warning-soft px-1 font-mono text-[.92em] font-semibold text-[#7a4d04]">{m[1]}</mark>);
    else parts.push(<b key={key++} className="font-semibold text-fg">{m[2]}</b>);
    i = m.index + m[0].length;
  }
  if (i < text.length) parts.push(text.slice(i));
  return <>{parts}</>;
}

            <h3 className="line-clamp-2 text-[14.5px] md:text-[15.5px] font-semibold leading-snug tracking-tight text-pretty">{ep.t}</h3>
            <div className="mt-1.5 flex flex-wrap items-center gap-x-2 gap-y-1 text-[11.5px] text-muted">
              <b className="font-medium text-fg">{ep.show}</b>
              <span>·</span><span>{ep.dur}</span>
              <span>·</span><span className="font-mono">{ep.date}</span>
            </div>
          </div>
          <StatusPill status={ep.status}/>
        </div>

        {ep.status === 'summarizing' || ep.status === 'transcribing' ? (
          <div className="mt-2.5 text-[12px] italic text-muted">{ep.excerpt}</div>
        ) : ep.status === 'error' ? (
          <div className="mt-2.5 text-[12px] text-destructive">{ep.excerpt}</div>
        ) : (
          <p className="mt-2 text-[12.5px] leading-relaxed text-[hsl(25_12%_30%)] line-clamp-2">{ep.excerpt}</p>
        )}

        {ep.status === 'done' && (
          <div className="mt-3 flex items-center justify-between gap-3">
            <div className="flex items-center gap-1.5 overflow-hidden">
              <Tag variant="cat">{ep.cat}</Tag>
              {ep.tags.slice(0,3).map(t => <Tag key={t}>{t}</Tag>)}
            </div>
            {ep.tickers.length > 0 && (
              <div className="hidden sm:flex shrink-0 items-center gap-2 font-mono text-[11px] text-muted">
                <span>標的 {ep.tickers.length}</span>
                {ep.bull > 0 && <b className="text-success font-bold">▲{ep.bull}</b>}
                {ep.bear > 0 && <b className="text-destructive font-bold">▼{ep.bear}</b>}
              </div>
            )}
          </div>
        )}
      </div>
    </article>
  );
}

/* ===========================================================
   ROOT
   =========================================================== */
function App() {
  const [tab, setTab] = React.useState('home');
  const [page, setPage] = React.useState('home'); // 'home' | 'history' | 'detail' | 'new'
  const [ep, setEp] = React.useState(null);

  const openEp = (e) => { setEp(e); setPage('detail'); };
  const onTab = (t) => { setTab(t); if (t==='home') setPage('home'); if (t==='history') setPage('history'); };
  const onNew = () => setPage('new');

  return (
    <AppShell tab={tab} setTab={onTab} page={page} setPage={setPage} onNew={onNew}>
      {page === 'home' && <Dashboard onOpen={openEp}/>}
      {page === 'history' && <HistoryPage onOpen={openEp}/>}
      {page === 'detail' && <DetailPage ep={ep} onBack={()=>{setPage('history'); setTab('history');}}/>}
      {page === 'new' && <NewPage onBack={()=>setPage(tab==='history'?'history':'home')}/>}
    </AppShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
